name: Deploy desktop-notes

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Zip package
        run: |
          zip -r function.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "*.env*" \
            --exclude "function.zip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Upload zip to S3
        run: |
          aws s3 cp function.zip s3://desktop-notes-deployments/function.zip

      - name: Deploy to Lambda from S3
        run: |
          aws lambda update-function-code \
            --function-name desktop-notes \
            --s3-bucket desktop-notes-deployments \
            --s3-key function.zip \
            --region ap-southeast-1